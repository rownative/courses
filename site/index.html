<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rowing Courses | rownative.icu</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ctext x='50%25' y='75%25' font-size='24' text-anchor='middle' fill='%231a3a4a' font-family='sans-serif'%3ER%3C/text%3E%3C/svg%3E">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1><img src="logo.png" alt="" class="logo" /> Rowing Courses</h1>
      <p class="tagline">GPS-defined courses for CrewNerd and rownative.icu</p>
      <div id="auth-status">
        <a href="privacy.html">Privacy</a>
        <a href="import.html">Import</a>
        <a href="submit.html">Submit</a>
        <a href="/oauth/authorize" id="sign-in-link" class="hidden">Sign in with intervals.icu</a>
        <span id="user-info" class="hidden"></span>
      </div>
    </header>

    <aside id="sidebar">
      <div class="controls">
        <input type="search" id="search" placeholder="Search courses..." />
        <select id="country-filter">
          <option value="">All countries</option>
        </select>
        <div class="filter-row">
          <label>
            <input type="checkbox" id="filter-provisional" checked /> Provisional
          </label>
          <label>
            <input type="checkbox" id="filter-established" checked /> Established
          </label>
        </div>
        <div class="distance-filter">
          <label>Distance: <span id="distance-range-label">0–25 km</span></label>
          <input type="range" id="distance-min" min="0" max="25" value="0" step="0.5" />
          <input type="range" id="distance-max" min="0" max="25" value="25" step="0.5" />
        </div>
        <div id="map-legend" class="map-legend">
          <span id="legend-liked" class="legend-item hidden"><span class="legend-dot liked"></span> Liked</span>
          <span class="legend-item"><span class="legend-dot established"></span> Established</span>
          <span class="legend-item"><span class="legend-dot provisional"></span> Provisional</span>
        </div>
      </div>
      <div id="course-list"></div>
    </aside>

    <main>
      <div id="map"></div>
      <div id="detail-panel" class="hidden">
        <button id="close-detail" aria-label="Close">×</button>
        <div id="detail-content"></div>
      </div>
    </main>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="app.js"></script>
</body>
</html>
